name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Validate JSON manifests
        run: |
          python3 -m json.tool .claude-plugin/plugin.json >/dev/null
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool hooks/hooks.json >/dev/null

      - name: Check bash syntax
        run: bash -n hooks/*.sh

      - name: Check no tracked symlinks
        run: |
          # project policy: compact-plus は Windows install 対応のため tracked symlink を禁止する
          # (Windows の git は既定で symlink をテキストファイルとして checkout し、plugin cache が壊れる)
          if git ls-files -s | grep '^120000'; then
            echo "Tracked symlinks are not allowed (broken on Windows git checkout)"
            exit 1
          fi

      - name: Check version consistency
        run: |
          plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))["version"])')"
          marketplace_meta_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))["metadata"]["version"])')"
          marketplace_plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))["plugins"][0]["version"])')"
          mismatch=0
          for name_ver in \
            ".claude-plugin/plugin.json:$plugin_version" \
            "marketplace.json metadata.version:$marketplace_meta_version" \
            "marketplace.json plugins[0].version:$marketplace_plugin_version"; do
            ver="${name_ver#*:}"
            if [ "$ver" != "$plugin_version" ]; then
              echo "Version mismatch: ${name_ver%%:*} = $ver (expected $plugin_version)"
              mismatch=1
            fi
          done
          if [ "$mismatch" -eq 1 ]; then exit 1; fi

      - name: Check state summary heading contract
        run: |
          # prompts/state-summary.md must declare the 10 state-file headings.
          for h in \
            '^# Compact Prep State$' \
            '^## Active Plan$' \
            '^## Current Phase$' \
            '^## TaskList Summary$' \
            '^## Session Decisions$' \
            '^## Constraints and Blockers$' \
            '^## Worker Topology$' \
            '^## Skills Invoked$' \
            '^## Editing Files$' \
            '^## Failed Attempts$' \
            '^## Recovery Notes$'; do
            if ! grep -Eq "$h" prompts/state-summary.md; then
              echo "Missing heading declaration in prompts/state-summary.md: $h"
              exit 1
            fi
          done
